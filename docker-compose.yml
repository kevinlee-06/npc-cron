services:
  npc-cron:
    build: .
    devices:
      - "/dev/snd:/dev/snd"
    user: "1000:1000"
    environment:
      - PIPEWIRE_RUNTIME_DIR=/run/user/1000
      - PULSE_SERVER=unix:/run/user/1000/pulse/native
    volumes:
      - npcron_data:/app/data
      - npcron_media:/app/media
      - /run/user/1000/pipewire-0:/run/user/1000/pipewire-0
      - /run/user/1000/pulse:/run/user/1000/pulse
    ports:
      - "8000:8000"
    restart: always

volumes:
  npcron_data:
  npcron_media:
